# 세팅 경로는 무조건 root!

name: deploy order order-backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout github
        uses: actions/checkout@v2 
      
      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.25.9"
        id: install
        
      - name: configure aws
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key:  ${{ secrets.AWS_SECRET }}
          aws-region: us-east-1

      - name: update cluster infomation
        run: aws eks update-kubeconfig --name  my-clusters --region us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: build and push docker image to ecr
        env:
          REGISTRY: 733048623876.dkr.ecr.us-east-1.amazonaws.com
          REPOSITORY: my-new-ecr
          IMAGE_TAG: latest
        run: |
          docker build \
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
          -f ./2.ordersystem/Dockerfile ./2.ordersystem
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: eks kubectl apply
        run: |
          kubectl rollout restart deployment ordersystem-backend -n leesh13
        # kubectl apply -f ./2.ordersystem/k8s/k8s-ordersystem/depl_svc.yml


# 1. 소스 코드 클론
# 2. kubectl 설치 및 cluster 생성
# 3. aws cli 설치 및 configure
# 4. docker image build & push
# 5. pod restart